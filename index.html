<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>LiseCephe | Van Atatürk Anadolu Lisesi</title>
    <style>
        /* --- TEMEL AYARLAR --- */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            scroll-behavior: smooth;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://i.postimg.cc/QtG2fVGm/d_w_a_f_e_s_g_r_d_h_t_f_y_j_k_g_t_u_o_f_m_h_d_g_n_s_x_f.jpg');
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 3px solid #ffffff;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin-bottom: 10px;
            object-fit: cover;
        }

        /* --- MENÜ --- */
        nav {
            background: #111;
            position: sticky;
            top: 0;
            z-index: 9999;
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            padding: 10px 15px;
            font-size: 0.8em;
        }

        /* --- ANA KONTEYNER --- */
        .main-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        section {
            padding: 40px 0;
            scroll-margin-top: 80px;
        }

        h2 { border-left: 6px solid #fff; padding-left: 15px; font-size: 1.4em; text-transform: uppercase; }

        /* --- VİDEO MASKELEME (AYAR DÜZELTİLDİ) --- */
        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .video-mask {
            width: 100%;
            height: 550px; /* Sabit yükseklik korundu */
            position: relative;
            overflow: hidden; /* Dışarıyı gizleyen asıl katman */
            border-radius: 20px;
            border: 2px solid #222;
            background: #000;
        }

        .video-mask iframe {
            position: absolute;
            /* YOUTUBE GİZLEME AYARI: %130 Büyütme ve Ofset */
            top: -15%; 
            left: -15%;
            width: 130%; 
            height: 130%;
            border: none;
            pointer-events: auto;
        }

        /* --- DUYURU VE İLETİŞİM --- */
        .info-card {
            background: #111;
            border: 2px solid #fff;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            margin-top: 20px;
        }

        .skor-text { font-size: 3em; font-weight: bold; display: block; margin: 10px 0; }

        .insta-link {
            display: block;
            background: #fff;
            color: #000;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 20px;
        }

        .hashtag-footer {
            text-align: center;
            margin-top: 40px;
            font-size: 1.3em;
            color: #444;
            font-style: italic;
        }

        /* TABLET VE PC İÇİN YAN YANA */
        @media (min-width: 650px) {
            .video-grid { flex-direction: row; }
            .video-mask { height: 480px; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/sg8dZwnC/Screenshot_20260319_225910_Gallery.jpg" alt="Logo" class="logo">
    <h1>LİSE CEPHE</h1>
    <p>VAN ATATÜRK ANADOLU LİSESİ</p>
</header>
