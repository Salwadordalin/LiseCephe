<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiseCephe | Van Atatürk Anadolu Lisesi</title>
    <style>
        /* --- GENEL AYARLAR --- */
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.postimg.cc/QtG2fVGm/d_w_a_f_e_s_g_r_d_h_t_f_y_j_k_g_t_u_o_f_m_h_d_g_n_s_x_f.jpg');
            background-size: cover;
            background-position: center;
            padding: 100px 20px;
            text-align: center;
            border-bottom: 5px solid #ffffff;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #fff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        header h1 { font-size: 3.5em; margin: 0; text-transform: uppercase; letter-spacing: 4px; }
        header p { font-size: 1.2em; letter-spacing: 5px; opacity: 0.8; }

        /* --- NAVİGASYON --- */
        nav {
            background: #111;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
            transition: 0.3s;
        }

        nav a:hover { 
            background: #fff; 
            color: #000; 
            border-radius: 4px;
        }

        /* --- İÇERİK --- */
        .container { max-width: 900px; margin: 60px auto; padding: 0 25px; }
        
        /* Navigasyon yüksekliği kadar boşluk bırakıyoruz ki başlıklar altta kalmasın */
        section { 
            margin-bottom: 100px; 
            scroll-margin-top: 80px; 
        }

        h2 { border-left: 10px solid #fff; padding-left: 20px; text-transform: uppercase; margin-bottom: 40px; }

        /* --- ÖZEL MASKELEME PLAYER --- */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            justify-items: center;
        }

        .video-mask {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 9 / 16;
            position: relative;
            overflow: hidden;
            border-radius: 25px;
            border: 2px solid #222;
        }

        .video-mask iframe {
            position: absolute;
            top: -8%;
            left: -8%;
            width: 116%;
            height: 116%;
            border: none;
        }

        /* --- GÜNCEL DURUM (DÜZELTİLDİ) --- */
        .duyuru-alani {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mac-sonucu {
            background: #1a1a1a;
            border: 2px solid #ffffff;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
        }

        .skor-baslik { color: #888; text-transform: uppercase; font-size: 0.9em; letter-spacing: 2px; }
        .skor-deger { font-size: 3.5em; font-weight: bold; letter-spacing: 8px; margin: 10px 0; }
        .takim-ismi { font-size: 1.2em; font-weight: bold; color: #fff; }
