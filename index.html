<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiseCephe | Van Atatürk Anadolu Lisesi</title>
    <style>
        /* --- GENEL AYARLAR --- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.postimg.cc/QtG2fVGm/d_w_a_f_e_s_g_r_d_h_t_f_y_j_k_g_t_u_o_f_m_h_d_g_n_s_x_f.jpg');
            background-size: cover;
            background-position: center;
            padding: 100px 20px;
            text-align: center;
            border-bottom: 5px solid #ffffff;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-bottom: 20px;
        }

        /* --- NAVİGASYON --- */
        nav {
            background: #111;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 25px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- VİDEO BÖLÜMÜ (ÖZEL PLAYER) --- */
        .video-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .video-container {
            position: relative;
            padding-bottom: 177.77%; /* Shorts için dikey oran (9:16) */
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #333;
            background: #000;
        }

        /* YouTube arayüzünü kenarlardan taşırarak gizleme hilesi */
        .video-container iframe {
            position: absolute;
            top: -10%; 
            left: -10%;
            width: 120%;
            height: 120%;
            border: none;
            pointer-events: auto; /* Tıklanabilirliği koru */
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            pointer-events: none; /* Altındaki videoya tıklamayı engellemez */
        }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        @media (max-width: 768px) {
            .video-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/sg8dZwnC/Screenshot_20260319_225910_Gallery.jpg" alt="Logo" class="logo">
    <h1>LİSE CEPHE</h1>
    <p>VAN ATATÜRK ANADOLU LİSESİ</p>
</header>

<nav>
    <a href="#medya">MEDYA</a>
    <a href="#besteler">BESTELER</a>
</nav>

<div class="container">
    <section id="medya">
        <h2 style="border-left: 5px solid #fff; padding-left: 15px;">CEPHE EDİTLERİ</h2>
        <div class="video-section">
            
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/FMtGeLAtUgE?autoplay=1&mute=1&loop=1&playlist=FMtGeLAtUgE&controls=0&modestbranding=1&showinfo=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <div class="video-overlay"></div>
            </div>

            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/KuEOPoky6j8?autoplay=1&mute=1&loop=1&playlist=KuEOPoky6j8&controls=0&modestbranding=1&showinfo=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <div class="video-overlay"></div>
            </div>

        </div>
    </section>
</div>

</body>
</html>
