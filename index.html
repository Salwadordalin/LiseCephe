<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiseCephe | Van Atatürk Anadolu Lisesi</title>
    <style>
        /* --- TEMEL AYARLAR --- */
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        #1a1a1a url('https://i.postimg.cc/QtG2fVGm/d_w_a_f_e_s_g_r_d_h_t_f_y_j_k_g_t_u_o_f_m_h_d_g_n_s_x_f.jpg');
            background-size: cover;
            background-position: center;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 4px solid #ffffff;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        header h1 { font-size: 3em; margin: 10px 0; text-transform: uppercase; letter-spacing: 3px; }
        header p { font-size: 1.1em; letter-spacing: 4px; opacity: 0.9; }

        /* --- MENÜ --- */
        nav {
            background: #111111;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
            transition: 0.3s;
        }

        nav a:hover { background: #ffffff; color: #000000; border-radius: 4px; }

        /* --- İÇERİK --- */
        .container { max-width: 850px; margin: 40px auto; padding: 0 20px; }
        
        section { 
            margin-bottom: 80px; 
            scroll-margin-top: 80px; 
        }

        h2 { border-left: 8px solid #ffffff; padding-left: 15px; text-transform: uppercase; margin-bottom: 30px; }

        /* --- VİDEO MASKELEME (YENİDEN AYARLANDI) --- */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .video-mask {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 9 / 16;
            position: relative;
            overflow: hidden; /* Dışarı taşan logoları keser */
            border-radius: 20px;
            border: 2px solid #222;
            background: #000;
        }

        .video-mask iframe {
            position: absolute;
            /* Videoyu %125 büyüterek YouTube yazılarını ekran dışına ittik */
            top: -12%;
            left: -12%;
            width: 124%;
            height: 124%;
            border: none;
        }

        /* --- DUYURU VE İLETİŞİM --- */
        .card {
            background: #1a1a1a;
            border: 2px solid #ffffff;
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .skor { font-size: 3.5em; font-weight: bold; letter-spacing: 6px; margin: 10px 0; }
        
        .insta-btn {
            background: #ffffff;
            color: #000000;
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            display: block;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1em;
        }

        .hashtag {
            display: block;
            text-align: center;
            margin-top: 35px;
            font-size: 1.5em;
            color: #444;
            font-style: italic;
        }

        /* MOBİL UYUM */
        @media (max-width: 700px) {
            .video-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2.2em; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/sg8dZwnC/Screenshot_20260319_225910_Gallery.jpg" alt="Logo" class="logo">
    <h1>LİSE CEPHE</h1>
    <p>VAN ATATÜRK ANADOLU LİSESİ</p>
</header>

<nav
