        /* --- TEMEL AYARLAR --- */
        html { scroll-behavior: smooth; height: 100%; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),

            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 4px solid #ffffff;
        }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            margin-bottom: 10px;
            object-fit: cover;
        }

        header h1 { font-size: 2.8em; margin: 5px 0; text-transform: uppercase; letter-spacing: 2px; }
        header p { font-size: 1em; letter-spacing: 3px; opacity: 0.9; }

        /* --- MENÜ --- */
        nav {
            background: #111111;
            padding: 12px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 8px 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8em;
            transition: 0.3s;
        }

        nav a:hover { background: #ffffff; color: #000000; border-radius: 4px; }

        /* --- KONTEYNER --- */
        .container { 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 0 20px;
            overflow: visible; /* İçeriğin kaybolmasını önler */
        }
        
        section { 
            margin-bottom: 60px; 
            scroll-margin-top: 70px;
            clear: both; 
        }

        h2 { border-left: 6px solid #ffffff; padding-left: 15px; text-transform: uppercase; margin-bottom: 25px; font-size: 1.5em; }

        /* --- VİDEO MASKELEME (GARANTİLENMİŞ YAPI) --- */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .video-mask {
            width: 100%;
            height: 500px; /* Sabit yükseklik verdik ki siyah boşluk kalmasın */
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 1px solid #333;
            background: #0a0a0a;
        }

        .video-mask iframe {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            border: none;
        }

        /* --- DUYURU VE İLETİŞİM --- */
        .card {
            background: #111111;
            border: 2px solid #ffffff;
            padding: 25px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .skor { font-size: 3em; font-weight: bold; letter-spacing: 4px; margin: 5px 0; }

            font-weight: bold;
            text-decoration: none;
            font-size: 1.1em;
            border: 1px solid #fff;
        }
